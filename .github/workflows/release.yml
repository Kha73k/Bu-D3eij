name: Build installer

# NOTE: running this needs GitHub Actions billing to be active. While the account's
# Actions billing is locked, releases are cut MANUALLY (see installer/README.md ->
# "Releasing"). This workflow is kept ready for when Actions is available again:
# dispatch it manually, or re-add a `push: tags: ['v*']` trigger to auto-build on a
# version tag. (Left as workflow_dispatch only so release tags don't spawn failed runs.)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage installer inputs (standalone Python + app source + VC++ runtime)
        shell: pwsh
        run: .\installer\build.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = Get-ChildItem 'C:\Program Files (x86)\Inno Setup*\ISCC.exe','C:\Program Files\Inno Setup*\ISCC.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) { throw 'ISCC.exe not found after installing Inno Setup' }
          & $iscc.FullName installer\bud3eij.iss
          if (-not (Test-Path installer\dist\BuD3eij-Setup.exe)) { throw 'installer was not produced' }
          "{0:N1} MB" -f ((Get-Item installer\dist\BuD3eij-Setup.exe).Length / 1MB)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BuD3eij-Setup
          path: installer/dist/BuD3eij-Setup.exe

      - name: Publish GitHub Release (on a version tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/dist/BuD3eij-Setup.exe
          generate_release_notes: true
          draft: true
